name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      authservice: ${{ steps.filter.outputs.authservice }}
      bookingservice: ${{ steps.filter.outputs.bookingservice }}
      notificationservice: ${{ steps.filter.outputs.notificationservice }}
      providerservice: ${{ steps.filter.outputs.providerservice }}
      userservice: ${{ steps.filter.outputs.userservice }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            authservice:
              - 'apps/authservice/**'
              - 'packages/shared/**'
            bookingservice:
              - 'apps/bookingservice/**'
              - 'packages/shared/**'
            notificationservice:
              - 'apps/notificationservice/**'
              - 'packages/shared/**'
            providerservice:
              - 'apps/providerservice/**'
              - 'packages/shared/**'
            userservice:
              - 'apps/userservice/**'
              - 'packages/shared/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma clients
        run: |
          npx prisma generate --schema=apps/authservice/prisma/schema.prisma
          npx prisma generate --schema=apps/bookingservice/prisma/schema.prisma
          npx prisma generate --schema=apps/notificationservice/prisma/schema.prisma
          npx prisma generate --schema=apps/providerservice/prisma/schema.prisma
          npx prisma generate --schema=apps/userservice/prisma/schema.prisma
      - run: npm run build

  test-authservice:
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: needs.changes.outputs.authservice == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=apps/authservice/prisma/schema.prisma
      - run: npm run test --workspace=authservice

  test-bookingservice:
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: needs.changes.outputs.bookingservice == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=apps/bookingservice/prisma/schema.prisma
      - run: npm run test --workspace=bookingservice

  test-notificationservice:
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: needs.changes.outputs.notificationservice == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=apps/notificationservice/prisma/schema.prisma
      - run: npm run test --workspace=notificationservice

  test-providerservice:
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: needs.changes.outputs.providerservice == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=apps/providerservice/prisma/schema.prisma
      - run: npm run test --workspace=providerservice

  test-userservice:
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: needs.changes.outputs.userservice == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=apps/userservice/prisma/schema.prisma
      - run: npm run test --workspace=userservice

  docker-build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build api-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api-gateway/Dockerfile
          push: false
          load: true
          tags: api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build authservice
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/authservice/Dockerfile
          push: false
          load: true
          tags: authservice:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build userservice
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/userservice/Dockerfile
          push: false
          load: true
          tags: userservice:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build providerservice
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/providerservice/Dockerfile
          push: false
          load: true
          tags: providerservice:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build bookingservice
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/bookingservice/Dockerfile
          push: false
          load: true
          tags: bookingservice:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build notificationservice
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/notificationservice/Dockerfile
          push: false
          load: true
          tags: notificationservice:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: [docker-build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api-gateway/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/api-gateway:${{ github.sha }}
            ghcr.io/${{ github.repository }}/api-gateway:latest
      - name: Build and push authservice
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/authservice/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/authservice:${{ github.sha }}
            ghcr.io/${{ github.repository }}/authservice:latest
      - name: Build and push userservice
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/userservice/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/userservice:${{ github.sha }}
            ghcr.io/${{ github.repository }}/userservice:latest
      - name: Build and push providerservice
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/providerservice/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/providerservice:${{ github.sha }}
            ghcr.io/${{ github.repository }}/providerservice:latest
      - name: Build and push bookingservice
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/bookingservice/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/bookingservice:${{ github.sha }}
            ghcr.io/${{ github.repository }}/bookingservice:latest
      - name: Build and push notificationservice
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/notificationservice/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/notificationservice:${{ github.sha }}
            ghcr.io/${{ github.repository }}/notificationservice:latest

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [docker-push]
    steps:
      - run: echo "Deploy placeholder - no deployment configured"
