services:
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - authservice
      - userservice
      - providerservice
      - bookingservice
      - notificationservice

  authservice:
    build:
      context: .
      dockerfile: apps/authservice/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001

  userservice:
    build:
      context: .
      dockerfile: apps/userservice/Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002

  providerservice:
    build:
      context: .
      dockerfile: apps/providerservice/Dockerfile
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003

  bookingservice:
    build:
      context: .
      dockerfile: apps/bookingservice/Dockerfile
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004

  notificationservice:
    build:
      context: .
      dockerfile: apps/notificationservice/Dockerfile
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
